<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat Panel — Standalone Component</title>
  <style>
    /* ================================================================
     * DESIGN TOKENS — cream + mint green
     * ================================================================ */
    :root {
      --bg:            #f8f6f1;
      --bg-subtle:     #f2efe9;
      --surface:       #ffffff;
      --surface-raised:#ffffff;
      --surface-glass: rgba(255,255,255,0.78);
      --fg:            #2a2a28;
      --fg-2:          #4a4a46;
      --muted:         #9a978e;
      --meta:          #b5b2a8;
      --border:        #e8e5dd;
      --border-subtle: #efede6;
      --accent:        #5cb89a;
      --accent-hover:  #4daa8a;
      --accent-soft:   rgba(92,184,154,0.10);
      --green:         #4aaf88;
      --green-glow:    rgba(74,175,136,0.20);
      --green-soft:    rgba(74,175,136,0.08);
      --gold:          #b8a66a;
      --gold-soft:     rgba(184,166,106,0.10);
      --white:         #ffffff;
      --font-body:     'Noto Sans SC', -apple-system, 'Segoe UI', system-ui, sans-serif;
      --font-mono:     'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, monospace;
      --fs-sm:   13px;
      --fs-xs:   11px;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --gap-xs: 6px;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font-body);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ================================================================
     * CHAT PANEL — glass morphism, bottom-center positioned
     * ================================================================ */
    .chat-panel {
      position: relative;
      width: min(480px, calc(100vw - 48px));
      max-height: calc(100vh - 160px);
      display: flex;
      flex-direction: column;
      background: var(--surface-glass);
      backdrop-filter: blur(20px) saturate(1.2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow:
        0 8px 32px rgba(0,0,0,0.06),
        0 1px 4px rgba(0,0,0,0.03);
      overflow: hidden;
    }

    /* ================================================================
     * HEADER
     * ================================================================ */
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-header-left { display: flex; align-items: center; gap: 10px; }

    .chat-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--green) 100%);
      display: grid;
      place-items: center;
      font-size: 14px;
    }

    .chat-title { font-size: var(--fs-sm); font-weight: 600; color: var(--fg); letter-spacing: -0.01em; }
    .chat-subtitle { font-size: var(--fs-xs); color: var(--meta); }

    .chat-status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 4px var(--green-glow);
    }

    .chat-header-actions { display: flex; gap: 4px; align-items: center; }

    .chat-header-btn {
      width: 28px; height: 28px; border-radius: 6px; border: none;
      background: transparent; color: var(--muted); cursor: pointer;
      display: grid; place-items: center; transition: all 0.15s;
    }
    .chat-header-btn:hover { background: var(--accent-soft); color: var(--accent); }

    /* ================================================================
     * MESSAGES
     * ================================================================ */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px 18px;
      display: flex; flex-direction: column; gap: 14px;
      min-height: 260px; max-height: 360px; scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; gap: 10px; max-width: 88%; animation: msgIn 0.3s var(--ease-out) both; }
    .msg-user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-ai { align-self: flex-start; }

    .msg-avatar-small {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
      display: grid; place-items: center; font-size: 12px; margin-top: 2px;
    }
    .msg-ai .msg-avatar-small  { background: var(--accent-soft); border: 1px solid var(--border); }
    .msg-user .msg-avatar-small { background: var(--gold-soft); border: 1px solid rgba(184,166,106,0.15); }

    .msg-content { display: flex; flex-direction: column; gap: 4px; }

    .msg-bubble {
      padding: 10px 14px; border-radius: var(--radius-md);
      font-size: var(--fs-sm); line-height: 1.55; letter-spacing: -0.005em;
    }
    .msg-user .msg-bubble {
      background: var(--accent); color: var(--white);
      border-bottom-right-radius: var(--gap-xs);
    }
    .msg-ai .msg-bubble {
      background: var(--surface-raised); color: var(--fg-2);
      border: 1px solid var(--border); border-bottom-left-radius: var(--gap-xs);
    }

    .msg-time { font-size: 10px; color: var(--meta); font-family: var(--font-mono); padding: 0 4px; }
    .msg-user .msg-time { text-align: right; }

    /* typing indicator */
    .msg-typing .msg-bubble { display: flex; gap: 5px; padding: 12px 16px; }

    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-4px); opacity: 1; }
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* command tag */
    .cmd-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; background: var(--green-soft); color: var(--green);
      border-radius: 4px; font-family: var(--font-mono); font-size: var(--fs-xs);
      font-weight: 600; margin-top: 6px;
    }
    .cmd-tag svg { width: 12px; height: 12px; }

    /* ================================================================
     * INPUT AREA
     * ================================================================ */
    .chat-input-area {
      padding: 12px 18px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-input-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-subtle); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 4px 4px 4px 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .chat-input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .chat-input {
      flex: 1; border: none; background: transparent; color: var(--fg);
      font-family: var(--font-body); font-size: var(--fs-sm);
      line-height: 1.5; outline: none; min-width: 0;
    }
    .chat-input::placeholder { color: var(--meta); }

    .chat-send-btn {
      width: 34px; height: 34px; border-radius: 10px; border: none;
      background: var(--accent); color: var(--white);
      display: grid; place-items: center; cursor: pointer;
      transition: all 0.15s; flex-shrink: 0;
    }
    .chat-send-btn:hover { background: var(--accent-hover); transform: scale(1.04); }
    .chat-send-btn:active { transform: scale(0.96); }
    .chat-send-btn svg { width: 16px; height: 16px; }

    .chat-input-hint {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 6px; font-size: 10px; color: var(--meta); letter-spacing: 0.02em;
    }

    .kbd {
      display: inline-flex; align-items: center; padding: 1px 5px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; font-family: var(--font-mono); font-size: 10px;
      color: var(--muted); line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="chat-avatar">🐱</div>
      <div>
        <div class="chat-title">Hermes</div>
        <div class="chat-subtitle">Windows AI 伴侣</div>
      </div>
    </div>
    <div class="chat-header-actions">
      <div class="chat-status-dot"></div>
      <button class="chat-header-btn" title="Settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4M4.22 4.22l2.83 2.83m9.9 9.9l2.83 2.83M1 12h4m14 0h4M4.22 19.78l2.83-2.83m9.9-9.9l2.83-2.83"/></svg>
      </button>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="chat-input-area">
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" type="text" placeholder="说点什么…" autocomplete="off" />
      <button class="chat-send-btn" id="sendBtn" title="发送">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="chat-input-hint">
      <span><kbd class="kbd">Enter</kbd> 发送</span>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const chatMessages = document.getElementById('chatMessages');
  const chatInput    = document.getElementById('chatInput');

  const demoMessages = [
    { role: 'ai',    text: '你好呀！我是小橘，你的 Windows AI 伴侣。有什么可以帮你的？', time: '09:41' },
    { role: 'user',  text: '帮我打开微信', time: '09:42' },
    { role: 'ai',    text: '好的，正在为你打开微信！', time: '09:42', cmd: '[APP:微信]' },
    { role: 'user',  text: '查看一下今天的天气', time: '09:43' },
    { role: 'ai',    text: '西安今天晴，26°C，空气质量良好。适合出门~', time: '09:43' },
  ];

  function renderMessage(msg, animate) {
    const div = document.createElement('div');
    div.className = `msg msg-${msg.role}`;
    if (animate) div.style.animationDelay = '0.05s';
    const avatarEmoji = msg.role === 'ai' ? '🐱' : '👤';
    let cmdHtml = '';
    if (msg.cmd) {
      cmdHtml = `<div class="cmd-tag">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
        ${msg.cmd}
      </div>`;
    }
    div.innerHTML = `
      <div class="msg-avatar-small">${avatarEmoji}</div>
      <div class="msg-content">
        <div class="msg-bubble">${msg.text}${cmdHtml}</div>
        <span class="msg-time">${msg.time}</span>
      </div>`;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function renderTyping() {
    const div = document.createElement('div');
    div.className = 'msg msg-ai msg-typing';
    div.id = 'typingIndicator';
    div.innerHTML = `
      <div class="msg-avatar-small">🐱</div>
      <div class="msg-content">
        <div class="msg-bubble">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
      </div>`;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  demoMessages.forEach(m => renderMessage(m, false));

  const aiResponses = [
    '好的，正在处理！',
    '收到，马上帮你完成~',
    '没问题！小橘这就去办。',
    '让我想想…… 好的，搞定了！',
    '已为你执行完毕，还需要什么帮助吗？',
  ];

  function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;
    const now = new Date();
    const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    renderMessage({ role: 'user', text, time }, true);
    chatInput.value = '';
    setTimeout(() => renderTyping(), 400);
    const delay = 1200 + Math.random() * 1000;
    setTimeout(() => {
      removeTyping();
      const resp = aiResponses[Math.floor(Math.random() * aiResponses.length)];
      const rt = new Date();
      const timeStr = rt.getHours().toString().padStart(2,'0') + ':' + rt.getMinutes().toString().padStart(2,'0');
      renderMessage({ role: 'ai', text: resp, time: timeStr }, true);
    }, delay);
  }

  document.getElementById('sendBtn').addEventListener('click', sendMessage);
  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
})();
</script>
</body>
</html>
